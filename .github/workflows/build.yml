name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Windows ${{ matrix.config }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]
        include:
          - config: Debug
            preset: windows-msvc-debug
          - config: Release
            preset: windows-msvc-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure (CMake preset)
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Run tests
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      - name: Stage artifact
        shell: pwsh
        run: |
          $stage = "stage/MagnifyShit-${{ matrix.config }}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          $exe = Get-ChildItem -Path "build/${{ matrix.preset }}/bin" -Recurse -Filter MagnifyShit.exe | Select-Object -First 1
          if (-not $exe) { throw "MagnifyShit.exe not found" }
          Copy-Item $exe.FullName -Destination $stage
          if (Test-Path README.md) { Copy-Item README.md -Destination $stage }
          if (Test-Path LICENSE)   { Copy-Item LICENSE   -Destination $stage }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MagnifyShit-${{ matrix.config }}
          path: stage/MagnifyShit-${{ matrix.config }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Release build
        uses: actions/download-artifact@v4
        with:
          name: MagnifyShit-Release
          path: release-bin

      - name: Download Debug build
        uses: actions/download-artifact@v4
        with:
          name: MagnifyShit-Debug
          path: debug-bin

      - name: Package
        run: |
          zip -j MagnifyShit-${GITHUB_REF_NAME}-win64.zip release-bin/*
          zip -j MagnifyShit-${GITHUB_REF_NAME}-win64-debug.zip debug-bin/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MagnifyShit-*-win64.zip
            MagnifyShit-*-win64-debug.zip
          generate_release_notes: true

  notify-badges:
    name: Refresh profile badges
    needs: [build]
    if: github.event_name != 'pull_request' && always()
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch refresh-badges
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh api -X POST repos/tonywied17/tonywied17/dispatches \
            -f event_type=refresh-badges \
            -f "client_payload[repo]=${{ github.repository }}"
